<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CafeHouse - Carta Digital</title>
  <meta name="description" content="Descubre la carta digital de CafeHouse. Especialistas en cafés fríos y calientes, matchas, batidos artesanales y aperitivos deliciosos en un ambiente rústico y moderno.">
  
  <!-- SEO & Social Meta -->
  <meta property="og:title" content="CafeHouse - Carta Digital">
  <meta property="og:description" content="Carta de cafés especiales y aperitivos de CafeHouse.">
  <meta property="og:type" content="website">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            serif: ['"Playfair Display"', 'serif'],
          },
          colors: {
            coffee: {
              50: '#fdf8f5',
              100: '#fbeee6',
              200: '#f6dccf',
              300: '#eebfa9',
              400: '#e1987b',
              500: '#d37554',
              600: '#c4573b',
              700: '#a3412c',
              800: '#833426',
              900: '#5c221a',
              950: '#2d0f0a',
            },
            rustic: {
              gold: '#c5a880',
              sand: '#f5ebe0',
              wood: '#3e2723',
              leaf: '#3f4e3f',
            }
          }
        }
      }
    }
  </script>
  
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-amber-50/40 text-stone-900 min-h-screen antialiased">

  <!-- Main Container: Centered on desktop, full-width on mobile -->
  <div class="max-w-md mx-auto min-h-screen bg-stone-50 shadow-2xl border-x border-stone-200/40 flex flex-col relative pb-8">
    
    <!-- Elegant Header -->
    <header class="relative h-56 flex flex-col justify-end p-6 overflow-hidden">
      <!-- Background Header Image -->
      <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?q=80&w=1000&auto=format&fit=crop')] bg-cover bg-center brightness-[0.35] scale-105 transition-transform duration-1000"></div>
      
      <!-- Gradient overlay -->
      <div class="absolute inset-0 bg-gradient-to-t from-stone-950/90 via-stone-950/40 to-transparent"></div>
      
      <!-- Cafe Badge & Info -->
      <div class="relative z-10">
        <div class="inline-flex items-center gap-2 bg-stone-900/60 backdrop-blur-md px-3 py-1 rounded-full border border-white/10 mb-2">
          <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
          <span class="text-[10px] text-emerald-400 font-semibold tracking-wider uppercase">Abierto hoy</span>
        </div>
        <h1 class="font-serif text-4xl text-amber-50 font-bold tracking-wide">CafeHouse</h1>
        <p class="text-xs text-amber-200/80 font-medium uppercase tracking-widest mt-1">Specialty Coffee & Cozy Vibes</p>
      </div>
    </header>

    <!-- Sticky Navigation & Search -->
    <div class="sticky top-0 z-20 bg-stone-50/95 backdrop-blur-md border-b border-stone-200/60 p-4">
      
      <!-- Search Input Container -->
      <div class="relative w-full mb-4">
        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-stone-400 text-sm"></i>
        <input 
          type="text" 
          id="search-input" 
          placeholder="Buscar café, aperitivo..." 
          class="w-full h-11 pl-11 pr-10 bg-white border border-stone-200 rounded-xl text-stone-900 placeholder-stone-400 text-sm outline-none focus:border-amber-800 focus:ring-1 focus:ring-amber-800/10 transition-all"
          aria-label="Buscar producto"
        >
        <button 
          id="clear-search-btn" 
          class="absolute right-3 top-1/2 -translate-y-1/2 text-stone-400 hover:text-stone-600 p-1 hidden"
          aria-label="Borrar búsqueda"
        >
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <!-- Categories Pills Selector -->
      <nav class="overflow-x-auto no-scrollbar" aria-label="Categorías del menú">
        <div class="flex gap-2 w-max pb-1" id="categories-tabs">
          <button 
            data-category="ALL" 
            class="category-btn active px-4 py-2 rounded-full text-xs font-bold tracking-wide uppercase transition-all duration-300 bg-amber-950 text-amber-50 shadow-md shadow-amber-950/20 border border-amber-950"
          >
            Todos
          </button>
          <button 
            data-category="CAFÉS FRÍOS" 
            class="category-btn px-4 py-2 rounded-full text-xs font-bold tracking-wide uppercase transition-all duration-300 bg-white text-stone-600 hover:text-stone-900 border border-stone-200"
          >
            Cafés Fríos
          </button>
          <button 
            data-category="CAFÉS CALIENTES" 
            class="category-btn px-4 py-2 rounded-full text-xs font-bold tracking-wide uppercase transition-all duration-300 bg-white text-stone-600 hover:text-stone-900 border border-stone-200"
          >
            Cafés Calientes
          </button>
          <button 
            data-category="OTROS" 
            class="category-btn px-4 py-2 rounded-full text-xs font-bold tracking-wide uppercase transition-all duration-300 bg-white text-stone-600 hover:text-stone-900 border border-stone-200"
          >
            Otros
          </button>
          <button 
            data-category="APERITIFS" 
            class="category-btn px-4 py-2 rounded-full text-xs font-bold tracking-wide uppercase transition-all duration-300 bg-white text-stone-600 hover:text-stone-900 border border-stone-200"
          >
            Aperitifs
          </button>
        </div>
      </nav>
    </div>

    <!-- Active Category Banner -->
    <div class="px-4 pt-4 pb-2">
      <h2 id="active-category-title" class="font-serif text-xl font-bold text-amber-950 border-b border-amber-900/10 pb-2">
        Todos los productos
      </h2>
    </div>

    <!-- Menu Cards Container -->
    <main class="flex-grow px-4 pb-20">
      
      <!-- Empty State -->
      <div id="empty-state" class="hidden flex-col items-center justify-center py-16 text-center text-stone-500">
        <i class="fa-solid fa-mug-saucer text-4xl text-amber-800/40 mb-4 animate-bounce"></i>
        <h3 class="font-serif text-lg font-bold text-stone-800 mb-1">Sin resultados</h3>
        <p class="text-xs max-w-[240px] leading-relaxed">No encontramos ningún producto que coincida con tu búsqueda.</p>
        <button id="reset-search-btn" class="mt-4 px-4 py-2 bg-amber-900 text-amber-50 rounded-full text-xs font-semibold shadow-md hover:bg-amber-950 transition-colors">
          Mostrar todo
        </button>
      </div>

      <!-- Menu Grid -->
      <div id="menu-container" class="grid grid-cols-2 gap-4">
        <!-- Injected dynamically by js/main.js -->
        <div class="h-48 bg-stone-200 animate-pulse rounded-2xl"></div>
        <div class="h-48 bg-stone-200 animate-pulse rounded-2xl"></div>
        <div class="h-48 bg-stone-200 animate-pulse rounded-2xl"></div>
        <div class="h-48 bg-stone-200 animate-pulse rounded-2xl"></div>
      </div>
    </main>

    <!-- Small Footer Branding -->
    <footer class="text-center py-4 border-t border-stone-200/40 mt-auto">
      <p class="font-serif text-xs italic text-stone-400">CafeHouse &copy; 2026</p>
    </footer>

  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
